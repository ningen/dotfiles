[manager]
keymap = [
  { on = "<Esc>", run = "escape",             desc = "Exit visual mode, clear selected, or cancel search" },
  { on = "q",     run = "quit",               desc = "Exit the process" },
  { on = "Q",     run = "quit --no-cwd-file", desc = "Exit without writing cwd-file" },
  { on = "<C-z>", run = "suspend",            desc = "Suspend the process" },

  # Navigation
  { on = "k", run = "arrow -1",  desc = "Move cursor up" },
  { on = "j", run = "arrow 1",   desc = "Move cursor down" },
  { on = "K", run = "arrow -5",  desc = "Move cursor up 5 lines" },
  { on = "J", run = "arrow 5",   desc = "Move cursor down 5 lines" },

  { on = "h", run = "leave",     desc = "Go back to parent directory" },
  { on = "l", run = "enter",     desc = "Enter the child directory" },
  { on = "H", run = "back",      desc = "Go back to previous directory" },
  { on = "L", run = "forward",   desc = "Go forward to next directory" },

  { on = "<Up>",    run = "arrow -1", desc = "Move cursor up" },
  { on = "<Down>",  run = "arrow 1",  desc = "Move cursor down" },
  { on = "<Left>",  run = "leave",    desc = "Go back to parent directory" },
  { on = "<Right>", run = "enter",    desc = "Enter the child directory" },

  { on = "<C-u>", run = "arrow -50%", desc = "Move cursor up half page" },
  { on = "<C-d>", run = "arrow 50%",  desc = "Move cursor down half page" },
  { on = "<C-b>", run = "arrow -100%", desc = "Move cursor up one page" },
  { on = "<C-f>", run = "arrow 100%",  desc = "Move cursor down one page" },

  { on = "g",  run = "arrow -99999999", desc = "Move cursor to the top" },
  { on = "G",  run = "arrow 99999999",  desc = "Move cursor to the bottom" },

  # Selection
  { on = "<Space>", run = "select --state=none", desc = "Toggle the current selection state" },
  { on = "v",       run = "visual_mode",          desc = "Enter visual mode" },
  { on = "V",       run = "visual_mode --unset",  desc = "Enter visual mode (unset)" },
  { on = "<C-a>",   run = "select_all --state=true",  desc = "Select all files" },
  { on = "<C-r>",   run = "select_all --state=none",  desc = "Inverse selection of all files" },

  # Operations
  { on = "o", run = "open",                        desc = "Open the selected files" },
  { on = "O", run = "open --interactive",           desc = "Open files interactively" },
  { on = "e", run = "open --hovered",              desc = "Open the hovered file" },
  { on = "E", run = "open --hovered --interactive", desc = "Open the hovered file interactively" },
  { on = "y", run = "yank",          desc = "Yank the selected files" },
  { on = "Y", run = "unyank",        desc = "Cancel the yank status" },
  { on = "x", run = "yank --cut",    desc = "Cut the selected files" },
  { on = "p", run = "paste",         desc = "Paste the yanked files" },
  { on = "P", run = "paste --force", desc = "Paste the yanked files (overwrite)" },
  { on = "-", run = "link",          desc = "Symlink the yanked files" },
  { on = "_", run = "link --relative", desc = "Symlink the yanked files (relative)" },
  { on = "d", run = "trash",         desc = "Trash the selected files" },
  { on = "D", run = "delete",        desc = "Delete the selected files" },
  { on = "a", run = "create",        desc = "Create a file or directory" },
  { on = "r", run = "rename --cursor=before_ext", desc = "Rename the selected file" },
  { on = ";", run = "shell",         desc = "Run a shell command" },
  { on = ":", run = "shell --block", desc = "Run a shell command (block)" },
  { on = ".",  run = "hidden toggle", desc = "Toggle the visibility of hidden files" },
  { on = "s", run = "search fd",    desc = "Search files by name via fd" },
  { on = "S", run = "search rg",    desc = "Search files by content via ripgrep" },
  { on = "<C-s>", run = "search --reset", desc = "Reset the search" },
  { on = "z", run = "jump zoxide",  desc = "Jump to a directory via zoxide" },
  { on = "Z", run = "jump fzf",     desc = "Jump to a directory via fzf" },

  # Find
  { on = "f",       run = "find",            desc = "Find next file" },
  { on = "F",       run = "find --previous", desc = "Find previous file" },
  { on = "<C-n>",   run = "find_arrow",              desc = "Go to next found" },
  { on = "<C-p>",   run = "find_arrow --previous",   desc = "Go to previous found" },

  # Sorting
  { on = ["m", "a"], run = "sort alphabetical --dir-first", desc = "Sort alphabetically" },
  { on = ["m", "A"], run = "sort alphabetical --reverse --dir-first", desc = "Sort reverse alphabetically" },
  { on = ["m", "c"], run = "sort created --dir-first",    desc = "Sort by creation time" },
  { on = ["m", "C"], run = "sort created --reverse --dir-first", desc = "Sort by creation time (reverse)" },
  { on = ["m", "m"], run = "sort modified --dir-first",   desc = "Sort by modification time" },
  { on = ["m", "M"], run = "sort modified --reverse --dir-first", desc = "Sort by modification time (reverse)" },
  { on = ["m", "s"], run = "sort size --dir-first",       desc = "Sort by size" },
  { on = ["m", "S"], run = "sort size --reverse --dir-first", desc = "Sort by size (reverse)" },
  { on = ["m", "e"], run = "sort extension --dir-first",  desc = "Sort by extension" },
  { on = ["m", "E"], run = "sort extension --reverse --dir-first", desc = "Sort by extension (reverse)" },

  # Tabs
  { on = "t",     run = "tab_create --current", desc = "Create a new tab with CWD" },
  { on = "1",     run = "tab_switch 0",          desc = "Switch to the first tab" },
  { on = "2",     run = "tab_switch 1",          desc = "Switch to the second tab" },
  { on = "3",     run = "tab_switch 2",          desc = "Switch to the third tab" },
  { on = "4",     run = "tab_switch 3",          desc = "Switch to the fourth tab" },
  { on = "5",     run = "tab_switch 4",          desc = "Switch to the fifth tab" },
  { on = "6",     run = "tab_switch 5",          desc = "Switch to the sixth tab" },
  { on = "7",     run = "tab_switch 6",          desc = "Switch to the seventh tab" },
  { on = "8",     run = "tab_switch 7",          desc = "Switch to the eighth tab" },
  { on = "9",     run = "tab_switch 8",          desc = "Switch to the ninth tab" },
  { on = "[",     run = "tab_switch -1 --relative", desc = "Switch to previous tab" },
  { on = "]",     run = "tab_switch 1 --relative",  desc = "Switch to next tab" },
  { on = "{",     run = "tab_swap -1", desc = "Swap current tab with prev" },
  { on = "}",     run = "tab_swap 1",  desc = "Swap current tab with next" },

  # Copy
  { on = ["c", "c"], run = "copy cell",     desc = "Copy the file name" },
  { on = ["c", "f"], run = "copy filename", desc = "Copy the filename without extension" },
  { on = ["c", "e"], run = "copy extension", desc = "Copy the extension" },
  { on = ["c", "p"], run = "copy path",     desc = "Copy the absolute path" },
  { on = ["c", "d"], run = "copy dirname",  desc = "Copy the path of the parent directory" },

  # Help
  { on = "~", run = "help", desc = "Open help" },
]

[tasks]
keymap = [
  { on = "<Esc>", run = "close", desc = "Close task manager" },
  { on = "<C-q>", run = "close", desc = "Close task manager" },
  { on = "w",     run = "close", desc = "Close task manager" },
  { on = "k",     run = "arrow -1", desc = "Move cursor up" },
  { on = "j",     run = "arrow 1",  desc = "Move cursor down" },
  { on = "<Up>",   run = "arrow -1", desc = "Move cursor up" },
  { on = "<Down>", run = "arrow 1",  desc = "Move cursor down" },
  { on = "<Enter>", run = "inspect", desc = "Inspect the task" },
  { on = "x",      run = "cancel",   desc = "Cancel the task" },
  { on = "~",      run = "help",     desc = "Open help" },
]

[select]
keymap = [
  { on = "<Esc>",   run = "close",          desc = "Cancel selection" },
  { on = "<C-q>",   run = "close",          desc = "Cancel selection" },
  { on = "<Enter>", run = "close --submit", desc = "Submit the selection" },
  { on = "k",       run = "arrow -1",       desc = "Move cursor up" },
  { on = "j",       run = "arrow 1",        desc = "Move cursor down" },
  { on = "<Up>",    run = "arrow -1",       desc = "Move cursor up" },
  { on = "<Down>",  run = "arrow 1",        desc = "Move cursor down" },
  { on = "~",       run = "help",           desc = "Open help" },
]

[input]
keymap = [
  { on = "<C-q>",   run = "close",          desc = "Cancel input" },
  { on = "<Enter>", run = "close --submit", desc = "Submit the input" },
  { on = "<Esc>",   run = "escape",         desc = "Go back to normal mode, or cancel input" },

  # Mode
  { on = "i",  run = "insert",                  desc = "Enter insert mode" },
  { on = "a",  run = "insert --append",         desc = "Enter append mode" },
  { on = "I",  run = ["move -999", "insert"],   desc = "Move to the BOL, and enter insert mode" },
  { on = "A",  run = ["move 999", "insert --append"], desc = "Move to the EOL, and enter append mode" },
  { on = "v",  run = "visual",                  desc = "Enter visual mode" },
  { on = "V",  run = ["move -999", "visual", "move 999"], desc = "Enter visual mode and select all" },

  # Movement
  { on = "h",       run = "move -1",    desc = "Move back a character" },
  { on = "l",       run = "move 1",     desc = "Move forward a character" },
  { on = "<Left>",  run = "move -1",    desc = "Move back a character" },
  { on = "<Right>", run = "move 1",     desc = "Move forward a character" },
  { on = "b",       run = "backward",   desc = "Move back a word" },
  { on = "w",       run = "forward",    desc = "Move forward a word" },
  { on = "0",       run = "move -999",  desc = "Move to the BOL" },
  { on = "$",       run = "move 999",   desc = "Move to the EOL" },
  { on = "<Home>",  run = "move -999",  desc = "Move to the BOL" },
  { on = "<End>",   run = "move 999",   desc = "Move to the EOL" },

  # Deletion
  { on = "<Backspace>", run = "backspace",         desc = "Delete the character before the cursor" },
  { on = "<Delete>",    run = "backspace --under", desc = "Delete the character under the cursor" },
  { on = "<C-h>",       run = "backspace",         desc = "Delete the character before the cursor" },
  { on = "<C-u>",       run = "kill-line",         desc = "Delete until BOL" },
  { on = "<C-k>",       run = "kill-line --append", desc = "Delete until EOL" },
  { on = "<C-w>",       run = "kill-back-word",    desc = "Delete the word before cursor" },
  { on = "<C-d>",       run = "backspace --under", desc = "Delete the char under cursor" },

  # Clipboard
  { on = "<C-y>", run = "yank",  desc = "Copy selected/highlighted text" },
  { on = "<C-p>", run = "paste", desc = "Paste from clipboard" },

  { on = "~", run = "help", desc = "Open help" },
]

[completion]
keymap = [
  { on = "<C-q>",   run = "close",          desc = "Cancel completion" },
  { on = "<Tab>",   run = "close --submit", desc = "Submit the completion" },
  { on = "<Enter>", run = "close --submit", desc = "Submit the completion" },
  { on = "<Esc>",   run = "close",          desc = "Cancel completion" },
  { on = "k",       run = "arrow -1",       desc = "Move cursor up" },
  { on = "j",       run = "arrow 1",        desc = "Move cursor down" },
  { on = "<Up>",    run = "arrow -1",       desc = "Move cursor up" },
  { on = "<Down>",  run = "arrow 1",        desc = "Move cursor down" },
  { on = "~",       run = "help",           desc = "Open help" },
]

[help]
keymap = [
  { on = "<Esc>",  run = "close", desc = "Close help" },
  { on = "<C-q>",  run = "close", desc = "Close help" },
  { on = "q",      run = "close", desc = "Close help" },
  { on = "k",      run = "arrow -1", desc = "Move cursor up" },
  { on = "j",      run = "arrow 1",  desc = "Move cursor down" },
  { on = "<Up>",   run = "arrow -1", desc = "Move cursor up" },
  { on = "<Down>", run = "arrow 1",  desc = "Move cursor down" },
  { on = "f",      run = "filter",   desc = "Filter help items" },
]
