[manager]
ratio = [1, 3, 4]
sort_by = "alphabetical"
sort_sensitive = false
sort_reverse = false
sort_dir_first = true
linemode = "none"
show_hidden = false
show_symlink = true
scrolloff = 5

[preview]
tab_size = 2
max_width = 600
max_height = 900
cache_dir = ""
image_filter = "triangle"
image_quality = 75
sixel_fraction = 15
ueberzug_scale = 1
ueberzug_offset = [0, 0, 0, 0]

[opener]
edit = [
  { run = '$EDITOR "$@"', block = true, for = "unix" },
]
open = [
  { run = 'xdg-open "$@"', for = "linux" },
  { run = 'open "$@"', for = "macos" },
]
reveal = [
  { run = 'xdg-open "$(dirname "$1")"', for = "linux" },
  { run = 'open -R "$1"', for = "macos" },
]
extract = [
  { run = 'unar "$1"', for = "unix" },
]
play = [
  { run = 'mpv "$@"', orphan = true, for = "unix" },
]

[open]
rules = [
  { mime = "text/*", use = "edit" },
  { mime = "image/*", use = "open" },
  { mime = "video/*", use = "play" },
  { mime = "audio/*", use = "play" },
  { mime = "application/zip", use = "extract" },
  { mime = "application/x-tar", use = "extract" },
  { mime = "application/x-bzip2", use = "extract" },
  { mime = "application/x-7z-compressed", use = "extract" },
  { mime = "inode/directory", use = "open" },
  { mime = "*", use = ["edit", "open"] },
]

[tasks]
micro_workers = 10
macro_workers = 5
bizarre_retry = 5
image_alloc = 536870912
image_bound = [0, 0]
suppress_preload = false

[log]
enabled = false
