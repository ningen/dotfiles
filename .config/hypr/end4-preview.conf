# end-4/dots-hyprland inspired preview settings.
# This file is intentionally small and reversible. It does not start Quickshell.

$end4Accent = rgba(89b4faee)
$end4AccentAlt = rgba(cba6f7ee)
$end4Surface = rgba(11111baa)

general {
    gaps_in = 4
    gaps_out = 14
    border_size = 2
    col.active_border = $end4Accent $end4AccentAlt 45deg
    col.inactive_border = $end4Surface
}

decoration {
    rounding = 12
    rounding_power = 2
    active_opacity = 0.98
    inactive_opacity = 0.94

    shadow {
        enabled = true
        range = 18
        render_power = 4
        color = rgba(00000066)
    }

    blur {
        enabled = true
        size = 8
        passes = 3
        vibrancy = 0.18
        popups = true
    }
}

animations {
    enabled = true

    bezier = end4EaseOut, 0.05, 0.7, 0.1, 1
    bezier = end4EaseInOut, 0.65, 0, 0.35, 1
    bezier = end4Spring, 0.2, 0.9, 0.1, 1.05

    animation = windows, 1, 4, end4Spring, popin 88%
    animation = windowsOut, 1, 3, end4EaseInOut, popin 88%
    animation = border, 1, 5, end4EaseOut
    animation = fade, 1, 4, end4EaseOut
    animation = layers, 1, 4, end4Spring, slide
    animation = workspaces, 1, 4, end4EaseInOut, slide
}

layerrule = blur on, match:namespace rofi
layerrule = blur on, match:namespace waybar
layerrule = blur on, match:namespace quickshell
layerrule = ignore_alpha 0.2, match:namespace rofi
layerrule = ignore_alpha 0.2, match:namespace waybar
layerrule = ignore_alpha 0.2, match:namespace quickshell

windowrule = opacity 0.97 override 0.92 override, match:class ^(kitty|ghostty|Alacritty)$
windowrule = match:class ^(org.pulseaudio.pavucontrol)$, float on
windowrule = match:title ^(Picture-in-Picture)$, float on
