# Sources are repository-relative. Targets may use $CONFIG_DIR,
# $VSCODE_CONFIG_DIR, $HOME, or a leading ~.
unix_only:
  - source: .gitconfig.local
    target: ~/.gitconfig.local
    type: file
  - source: .config/git
    target: $CONFIG_DIR/git
    type: directory
  - source: .config/nvim
    target: $CONFIG_DIR/nvim
    type: directory
  - source: .config/tmux
    target: $CONFIG_DIR/tmux
    type: directory
  - source: .config/emacs
    target: $CONFIG_DIR/emacs
    type: directory
  - source: .config/helix
    target: $CONFIG_DIR/helix
    type: directory
  - source: .config/yazi
    target: $CONFIG_DIR/yazi
