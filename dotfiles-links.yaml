# Dotfiles symlink configuration
# Variables available:
#   $CONFIG_DIR - XDG_CONFIG_HOME or OS default config directory
#   $VSCODE_CONFIG_DIR - VSCode user configuration directory

# Common links for all platforms
common:
  - source: .gitconfig.local
    target: ~/.gitconfig.local
    type: file

  - source: .config/git
    target: $CONFIG_DIR/git
    type: directory

  - source: .config/nvim
    target: $CONFIG_DIR/nvim
    type: directory

  - source: .config/tmux
    target: $CONFIG_DIR/tmux
    type: directory

  - source: .config/kitty
    target: $CONFIG_DIR/kitty
    type: directory

  - source: .config/doom
    target: $CONFIG_DIR/doom
    type: directory

  - source: .config/wezterm
    target: $CONFIG_DIR/wezterm
    type: directory

  - source: .config/discord/settings.json
    target: $CONFIG_DIR/discord/settings.json
    type: file

  - source: .config/helix
    target: $CONFIG_DIR/helix
    type: directory

  - source: .config/yazi
    target: $CONFIG_DIR/yazi
    type: directory

  - source: .config/nix
    target: $CONFIG_DIR/nix
    type: directory

  - source: .config/agents/skills/codex-user-skill-author
    target: ~/.agents/skills/codex-user-skill-author
    type: directory

  - source: .config/agents/skills/nix-env-maintainer
    target: ~/.agents/skills/nix-env-maintainer
    type: directory

  - source: .config/agents/skills/dotfiles-link-manager
    target: ~/.agents/skills/dotfiles-link-manager
    type: directory

  - source: .config/agents/skills/typescript-quality-reviewer
    target: ~/.agents/skills/typescript-quality-reviewer
    type: directory

  - source: .config/agents/skills/git-message-style
    target: ~/.agents/skills/git-message-style
    type: directory

  - source: .config/agents/skills/natural-writing-editor
    target: ~/.agents/skills/natural-writing-editor
    type: directory

  - source: .config/agents/skills/verify-ui-with-screenshots
    target: ~/.agents/skills/verify-ui-with-screenshots
    type: directory

  - source: .config/agents/vendor/cloudflare-skills/skills/agents-sdk
    target: ~/.agents/skills/agents-sdk
    type: directory

  - source: .config/agents/vendor/cloudflare-skills/skills/cloudflare
    target: ~/.agents/skills/cloudflare
    type: directory

  - source: .config/agents/vendor/cloudflare-skills/skills/cloudflare-email-service
    target: ~/.agents/skills/cloudflare-email-service
    type: directory

  - source: .config/agents/vendor/cloudflare-skills/skills/durable-objects
    target: ~/.agents/skills/durable-objects
    type: directory

  - source: .config/agents/vendor/cloudflare-skills/skills/sandbox-sdk
    target: ~/.agents/skills/sandbox-sdk
    type: directory

  - source: .config/agents/vendor/cloudflare-skills/skills/turnstile-spin
    target: ~/.agents/skills/turnstile-spin
    type: directory

  - source: .config/agents/vendor/cloudflare-skills/skills/web-perf
    target: ~/.agents/skills/web-perf
    type: directory

  - source: .config/agents/vendor/cloudflare-skills/skills/workers-best-practices
    target: ~/.agents/skills/workers-best-practices
    type: directory

  - source: .config/agents/vendor/cloudflare-skills/skills/wrangler
    target: ~/.agents/skills/wrangler
    type: directory

# Unix-only links (macOS and Linux)
unix_only:
  - source: .config/nix
    target: $CONFIG_DIR/nix
    type: directory

  - source: .config/hypr
    target: $CONFIG_DIR/hypr
    type: directory

  - source: .config/waybar
    target: $CONFIG_DIR/waybar
    type: directory

# VSCode configuration
vscode:
  - source: .config/vscode/settings.json
    target: $VSCODE_CONFIG_DIR/settings.json
    type: file

  - source: .config/vscode/keybindings.json
    target: $VSCODE_CONFIG_DIR/keybindings.json
    type: file

# Windows-specific links
windows_only: []
