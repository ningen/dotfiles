  - source: .config/agents/vendor/cloudflare-skills/skills/web-perf
    target: ~/.agents/skills/web-perf
    type: directory
  - source: .config/agents/vendor/cloudflare-skills/skills/workers-best-practices
    target: ~/.agents/skills/workers-best-practices
