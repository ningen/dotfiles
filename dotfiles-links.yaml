    target: $CONFIG_DIR/wezterm
    type: directory

wsl_only: []

windows_only:
  - source: .config/wezterm
    target: $CONFIG_DIR/wezterm
    type: directory
  - source: windows/glazewm/config.yaml
    target: $HOME/.glzr/glazewm/config.yaml
    type: file
  - source: windows/powershell/Microsoft.PowerShell_profile.ps1
    target: $HOME/Documents/PowerShell/Microsoft.PowerShell_profile.ps1
    type: file

vscode:
  - source: .config/vscode/settings.json
    target: $VSCODE_CONFIG_DIR/settings.json
    type: file
  - source: .config/vscode/keybindings.json
    target: $VSCODE_CONFIG_DIR/keybindings.json
