desktop_linux_only:
  - source: .config/kitty
    target: $CONFIG_DIR/kitty
    type: directory
  - source: .config/discord/settings.json
    target: $CONFIG_DIR/discord/settings.json
    type: file
  - source: .config/hypr
    target: $CONFIG_DIR/hypr
    type: directory
  - source: .config/wallpapers
    target: $CONFIG_DIR/wallpapers
    type: directory
  - source: .config/illogical-impulse/config.json
    target: $CONFIG_DIR/illogical-impulse/config.json
